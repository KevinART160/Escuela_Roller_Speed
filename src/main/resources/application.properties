spring.application.name=rollerspeed

# PUERTO
server.port=3000

# CONEXION MYSQL
spring.datasource.url=jdbc:mysql://localhost:3306/roller_speed?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=kevin1234

# DRIVER MYSQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE CONFIGURACIÓN
# Cambiado de "none" a "update" para que cree las tablas automáticamente
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ESTRATEGIA DE NOMBRAMIENTO
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl