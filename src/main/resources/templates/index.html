<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }
      header {
        width: 100%;
        height: 85px;
        padding: 1rem;
        background-color: #23284c;
        margin-bottom: 3rem;
      }
      nav {
        width: 100%;
        height: 100%;
      }
      nav ul {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        list-style: none;
      }
      nav ul li a {
        color: #00000e;
        text-decoration: none;
        font-weight: bold;
        transition: color 0.3s ease-in-out;
      }
      nav ul li {
        position: relative;
        &:hover > a {
          color: #dbc5ff;
        }
        &::after {
          position: absolute;
          bottom: -5px;
          content: "";
          display: block;
          width: 0%;
          height: 4.6px;
          background-color: #dbc5ff;
          border-radius: 1px;
          transition: width 0.3s ease-in-out;
        }
        &:hover::after {
          width: 100%;
        }
      }
      main {
        width: 90%;
        max-width: 1270px;
        margin: 0 auto;
      }
      h1 {
      }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a th:href="@{/mision}">Misión</a></li>
          <li><a th:href="@{/vision}">Visión</a></li>
          <li><a th:href="@{/valores}">Valores</a></li>
          <li><a th:href="@{/servicios}">Servicios</a></li>
          <li><a th:href="@{/eventos}">Eventos</a></li>
          <li><a th:href="@{/admin/teachers/register}">Registro Docente</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <h1>Menú Principal</h1>
      <h2>Bienvenido al portal de Roller Speed</h2>
      <div class=""></div>
    </main>
  </body>
</html>
